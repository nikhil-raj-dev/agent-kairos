<!DOCTYPE html>
<html>
<head>
    <title>Agent-Kairos</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar hidden">
        <h3>Agent Thinking</h3>
        <div id="steps"></div>
    </div>

    <!-- Main Area -->
    <div class="main">

        <div id="title" class="title-container">
            <div class="title-glass title-hero">
                <h1>Agent-Kairos</h1>
            </div>
        </div>

        <div class="title-block">
            <!-- <p id="title-text">Agent-Kairos</p> -->
            <p class="tagline">Ask your data anything. Forecast, analyze, and visualize instantly.</p>
        </div>

        <div id="chat" class="chat hidden"></div>

        <div id="inputArea" class="centered-input">
            <input id="query" placeholder="Ask something..." />
            <button id="sendBtn">Ask</button>
        </div>

        <p id="suggestions-label">Try asking:</p>
        <div id="suggestions" class="suggestions">
            <span onclick="fillQuery('Show last month sales for Electronics category')">Show last month sales for Electronics category</span>
            <span onclick="fillQuery('Forecast 30 days for Stationary category')">Forecast 30 days for Stationary category</span>
            <span onclick="fillQuery('Is there any anomalies in Toys category?')">Is there any anomalies in Toys category?</span>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
</body>
</html>
